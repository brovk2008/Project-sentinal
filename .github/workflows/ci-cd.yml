name: Project Sentinel CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Python Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run Black Code Style Check
        run: |
          black --check --line-length 120 backend scratch

      - name: Run Flake8 Syntax & Code Integrity Check
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend scratch --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all other errors as warnings.
          flake8 backend scratch --count --exit-zero --max-line-length=120 --statistics

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          # Install test client specific requirements if any
          pip install httpx

      - name: Prepopulate Database / Run Migrations (Local Dev Mode)
        run: |
          # Prepares local SQLite DB file for offline execution
          python scratch/v2_schema_setup.py

      - name: Run V2 API Tests
        run: |
          python scratch/test_v2_api.py

      - name: Run V2 Workspace Flow Tests
        run: |
          python scratch/test_v2_workspace_flow.py

      - name: Run V2 Ingestion & Migration Tests
        run: |
          python scratch/test_v2_ingestion_migration.py

      - name: Run V2 API Integrations Tests (with Mocked Providers)
        run: |
          python scratch/test_v2_api_integrations.py

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Zoho Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Set Active Environment to Development (idx 1)
        run: |
          python scripts/set_active_env.py 1

      - name: Deploy static Client and AppSail to Catalyst Development
        run: |
          catalyst deploy --project "${{ secrets.CATALYST_PROJECT_NAME }}" --token "${{ secrets.CATALYST_TOKEN }}" --verbose

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Zoho Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Set Active Environment to Staging (idx 2)
        run: |
          python scripts/set_active_env.py 2

      - name: Deploy static Client and AppSail to Catalyst Staging
        run: |
          catalyst deploy --project "${{ secrets.CATALYST_PROJECT_NAME }}" --token "${{ secrets.CATALYST_TOKEN }}" --verbose

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://project-sentinel-60073535543.production.catalystserverless.in/app/index.html
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Zoho Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Set Active Environment to Production (idx 3)
        run: |
          python scripts/set_active_env.py 3

      - name: Deploy static Client and AppSail to Catalyst Production
        run: |
          catalyst deploy --project "${{ secrets.CATALYST_PROJECT_NAME }}" --token "${{ secrets.CATALYST_TOKEN }}" --verbose
