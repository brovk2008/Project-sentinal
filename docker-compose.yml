version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: sentinel_postgres
    restart: always
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the schema file so it's initialized on container creation
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentinel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
